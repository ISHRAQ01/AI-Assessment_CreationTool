version: '3.8'
services:
  mongodb:
    image: mongo:6
    container_name: veda-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  redis:
    image: redis:7-alpine
    container_name: veda-redis
    restart: always
    ports:
      - "6379:6379"
volumes:
  mongo_data: